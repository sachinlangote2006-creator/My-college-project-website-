<div class="form-box">
    <h2>Education Details</h2>
    <form action="page4.html">
        <h3>10th Standard</h3>
        <label>School Name:</label><br>
        <input type="text" name="sch10" required placeholder="Enter School Name"><br><br>
        
        <label>Board Name:</label><br>
        <input type="text" name="brd10" required placeholder="e.g. CBSE/State Board"><br><br>
        
        <label>Percentage (%):</label><br>
        <input type="number" step="0.01" name="per10" required placeholder="00.00"><br><hr>

        <h3>12th Standard</h3>
        <label>College Name:</label><br>
        <input type="text" name="clg12" required><br><br>
        
        <label>Percentage (%):</label><br>
        <input type="number" step="0.01" name="per12" required><br><hr>

        <h3>Current Degree</h3>
        <label>Degree Type:</label><br>
        <input type="text" name="degType" placeholder="e.g. B.Tech AI & DS"><br><br>
        
        <label>College Name:</label><br>
        <input type="text" name="degClg"><br><br>

        <button type="submit"><a href="nirmitipage4">Proceed to Documents</a></button>
    </form>
</div>
