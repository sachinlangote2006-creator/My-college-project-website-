<!DOCTYPE html>
<html>
<head>
    <title>Submission Successful</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>✅ Submission Received!</h1>
        <p id="welcome-msg">Thank you for registering.</p>
        <hr>
        <div style="margin-bottom: 20px;">
            <a href="index.html" class="btn">Add Another Student</a>
        </div>
    </div>

    <script>
        // Retrieve the data saved from the previous page
        const data = JSON.parse(localStorage.getItem('lastSubmittedStudent'));
        if (data) {
            document.getElementById('welcome-msg').innerText = `Thank you, ${data.name}. Your Roll No (${data.roll}) has been recorded.`;
        }
    </script>
</body>
</html>
